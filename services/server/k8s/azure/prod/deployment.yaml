apiVersion: apps/v1
kind: Deployment
metadata:
  name: knockout-server
  namespace: default
  labels:
    app: knockout-server
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knockout-server
      environment: production
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: knockout-server
        environment: production
    spec:
      containers:
        - name: knockout-server
          image: lyznai.azurecr.io/knockout-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: ENV
              value: "PROD"
            - name: ENVIRONMENT
              value: "PROD"
          envFrom:
            - secretRef:
                name: knockout-server-env
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
